<!DOCTYPE html>
<html>
<head>
    <title>Add Review</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#f1fff4,#d9f7e3);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:Arial, sans-serif;
        }

        .review-card{
            background:white;
            padding:40px;
            border-radius:25px;
            max-width:550px;
            width:100%;
            box-shadow:0 15px 40px rgba(0,0,0,0.10);
        }

        h1{
            color:#1b4332;
            font-weight:800;
            text-align:center;
            margin-bottom:25px;
        }

        .form-control,
        .form-select{
            border-radius:15px;
            padding:13px;
        }

        .btn-review{
            background:#2d6a4f;
            color:white;
            border:none;
            border-radius:30px;
            padding:13px;
            font-weight:700;
            width:100%;
        }

        .btn-review:hover{
            background:#1b4332;
            color:white;
        }
    </style>
</head>

<body>

<div class="review-card">

    <h1>⭐ Add Review</h1>

    <form method="POST">
        {% csrf_token %}

        <select name="rating" class="form-select mb-3" required>
            <option value="">Select Rating</option>
            <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
            <option value="4">⭐⭐⭐⭐ Good</option>
            <option value="3">⭐⭐⭐ Average</option>
            <option value="2">⭐⭐ Poor</option>
            <option value="1">⭐ Bad</option>
        </select>

        <textarea name="comment"
                  class="form-control mb-3"
                  rows="5"
                  placeholder="Write your review..."
                  required></textarea>

        <button type="submit" class="btn-review">
            Submit Review
        </button>
    </form>

</div>

</body>
</html>
