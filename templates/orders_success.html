<!DOCTYPE html>
<html>
<head>
    <title>Order Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#eef9f1;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:Arial, sans-serif;
        }

        .success-box{
            background:#fff;
            max-width:520px;
            width:100%;
            padding:40px 35px;
            border-radius:18px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
            text-align:center;
        }

        .icon{
            width:70px;
            height:70px;
            background:#2d6a4f;
            color:white;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:34px;
            margin:0 auto 20px;
        }

        h1{
            color:#1b4332;
            font-weight:800;
            font-size:30px;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        .btn-main{
            background:#2d6a4f;
            color:white;
            border-radius:25px;
            padding:10px 25px;
            font-weight:600;
        }

        .btn-main:hover{
            background:#1b4332;
            color:white;
        }

        .btn-outline-custom{
            border:1px solid #2d6a4f;
            color:#2d6a4f;
            border-radius:25px;
            padding:10px 25px;
            font-weight:600;
        }

        .btn-outline-custom:hover{
            background:#2d6a4f;
            color:white;
        }
    </style>
</head>

<body>

<div class="success-box">

    <div class="icon">✓</div>

    <h1>Order Confirmed</h1>

    <p>
        Your order has been placed successfully. You can track it from your orders page.
    </p>

    <a href="{% url 'my_orders' %}" class="btn btn-main me-2">
        My Orders
    </a>

    <a href="{% url 'menu' %}" class="btn btn-outline-custom">
        Back to Menu
    </a>

</div>

</body>
</html>
