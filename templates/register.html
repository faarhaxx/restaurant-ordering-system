{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">

    <style>
        body{
            margin:0;
            background:#487a55;
            font-family:Arial, sans-serif;
        }

        .register-wrapper{
            min-height:100vh;
            display:flex;
        }

        .left-box{
            width:45%;
            background:url("{% static 'img/login-bg.jpg' %}") center/cover no-repeat;
        }

        .right-box{
            width:55%;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .form-box{
            width:420px;
            background:white;
            padding:38px;
            border-radius:22px;
            box-shadow:0 12px 35px rgba(0,0,0,0.10);
        }

        .logo{
            text-align:center;
            font-size:28px;
            font-weight:800;
            color:#2d6a4f;
            margin-bottom:10px;
        }

        h2{
            text-align:center;
            color:#1b4332;
            font-weight:800;
            margin-bottom:8px;
        }

        .subtitle{
            text-align:center;
            color:#777;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:13px 18px;
            margin-bottom:15px;
            border:none;
            border-radius:30px;
            background:#f0f5f1;
            outline:none;
        }

        input:focus{
            box-shadow:0 0 0 2px #2d6a4f33;
        }

        .btn-register{
            width:100%;
            border:none;
            border-radius:30px;
            padding:13px;
            background:#2d6a4f;
            color:white;
            font-weight:700;
        }

        .btn-register:hover{
            background:#1b4332;
        }

        .link{
            text-align:center;
            margin-top:18px;
        }

        .link a{
            color:#2d6a4f;
            text-decoration:none;
            font-weight:700;
        }

        @media(max-width:768px){
            .left-box{
                display:none;
            }

            .right-box{
                width:100%;
                padding:20px;
            }
        }
    </style>
</head>

<body>

<div class="register-wrapper">

    <div class="left-box"></div>

    <div class="right-box">

        <div class="form-box">

            <div class="logo">🍴 Restoran</div>

            <h2>Create Account</h2>

            <p class="subtitle">
                Register and start ordering delicious food
            </p>

            <form method="POST">

                {% csrf_token %}

                <input type="text"
                       name="username"
                       placeholder="Username"
                       required>

                <input type="email"
                       name="email"
                       placeholder="Email Address"
                       required>

                <input type="password"
                       name="password1"
                       placeholder="Password"
                       required>

                <input type="password"
                       name="password2"
                       placeholder="Confirm Password"
                       required>

                <button type="submit"
                        class="btn-register">
                    Create Account
                </button>

            </form>

            <div class="link">
                Already have an account?
                <a href="{% url 'login' %}">
                    Login
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
