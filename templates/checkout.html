<!DOCTYPE html>

<html>
<head>
    <title>Checkout</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body{
        background: linear-gradient(135deg,#f1fff4,#d9f7e3);
        min-height:100vh;
    }

    .checkout-card{
        background:white;
        border-radius:25px;
        padding:35px;
        box-shadow:0 15px 40px rgba(0,0,0,0.10);
    }

    .page-title{
        font-size:48px;
        font-weight:800;
        color:#1b4332;
    }

    .form-control{
        border-radius:15px;
        padding:14px;
    }

    .form-control:focus{
        border-color:#2d6a4f;
        box-shadow:none;
    }

    .summary-card{
        background:#ffffff;
        border-radius:25px;
        padding:25px;
        box-shadow:0 15px 40px rgba(0,0,0,0.10);
    }

    .checkout-btn{
        background:#2d6a4f;
        border:none;
        color:white;
        border-radius:30px;
        padding:14px;
        font-weight:700;
        width:100%;
    }

    .checkout-btn:hover{
        background:#1b4332;
        color:white;
    }

    .food-item{
        padding:10px 0;
        border-bottom:1px solid #eee;
    }

    .total-price{
        font-size:28px;
        font-weight:800;
        color:#2d6a4f;
    }

</style>
```

</head>

<body>

<div class="container py-5">

```
<div class="text-center mb-5">
    <h1 class="page-title">Checkout</h1>
    <p class="text-muted fs-5">
        Complete your order details
    </p>
</div>

<div class="row g-4">

    <div class="col-lg-7">

        <div class="checkout-card">

            <h3 class="mb-4">Delivery Information</h3>

            <form method="POST">

                {% csrf_token %}

                <input type="text"
                       name="name"
                       class="form-control mb-3"
                       placeholder="Full Name"
                       required>

                <input type="text"
                       name="phone"
                       class="form-control mb-3"
                       placeholder="Phone Number"
                       required>

                <textarea
                    name="address"
                    class="form-control mb-4"
                    rows="5"
                    placeholder="Delivery Address"
                    required></textarea>

                <button type="submit"
                        class="checkout-btn">
                    Place Order
                </button>

            </form>

        </div>

    </div>

    <div class="col-lg-5">

        <div class="summary-card">

            <h3 class="mb-4">
                Order Summary
            </h3>

            {% for item in cart_items %}

            <div class="food-item d-flex justify-content-between">

                <span>
                    {{ item.food.name }}
                    x {{ item.quantity }}
                </span>

                <strong>
                    ₹{% widthratio item.food.price 1 item.quantity %}
                </strong>

            </div>

            {% endfor %}

            <hr>

            <div class="d-flex justify-content-between align-items-center">

                <h4>Total</h4>

                <div class="total-price">
                    ₹{{ total }}
                </div>

            </div>

        </div>

    </div>

</div>
```

</div>

</body>
</html>
